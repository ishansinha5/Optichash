services:
  # Zone 2: PostGIS Database (Seeded with LoCG Schema)
  spatial_db:
    image: postgis/postgis:15-3.3
    container_name: spatial_db
    restart: always
    environment:
      - POSTGRES_DB=comicdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=enterprise_secure
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database-init:/docker-entrypoint-initdb.d 
    networks:
      - comic_net

  # Zone 2: Java API Gateway 
  gateway_service:
    build: ./gateway-java
    container_name: java_gateway
    # Removed public port exposure. Only Nginx can talk to it now!
    networks:
      - comic_net

  # Zone 3: Native C++ Bouncer
  phash_bouncer:
    build: ./phash-cpp
    container_name: cpp_bouncer
    ports:
      - "8081:8081" 
    networks:
      - comic_net

  # Zone 4: Python FastAPI Brain (The PyTorch Fallback)
  ml-python:
    build: ./ml-python
    container_name: ml_vision
    ports:
      - "8000:8000"
    networks:
      - comic_net

  # Zone 1: Nginx Edge Gateway (The Public Face)
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway_service
    networks:
      - comic_net

networks:
  comic_net:
    driver: bridge

volumes:
  db_data: